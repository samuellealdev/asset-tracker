name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: asset_tracker
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongo:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: mongo
          MONGO_INITDB_ROOT_PASSWORD: changeme
        ports:
          - 27017:27017

      kafka:
        image: apache/kafka:3.9.2
        env:
          KAFKA_NODE_ID: 0
          KAFKA_PROCESS_ROLES: controller,broker
          KAFKA_LISTENERS: PLAINTEXT://localhost:9092,CONTROLLER://localhost:9093
          KAFKA_CONTROLLER_QUORUM_VOTERS: 0@localhost:9093
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
        ports:
          - 9092:9092

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Go tests
        working-directory: go-service
        env:
          POSTGRES_DSN: postgres://postgres:changeme@localhost:5432/asset_tracker?sslmode=disable
          KAFKA_BROKER: localhost:9092
        run: go test ./... -v -race -count=1

      - name: Node.js tests
        working-directory: node-service
        env:
          MONGO_URI: mongodb://mongo:changeme@localhost:27017/asset_tracker?authSource=admin
        run: |
          npm ci
          node --test

      - name: Web UI tests
        working-directory: web-ui
        run: |
          npm ci
          npx vitest run
          npx tsc --noEmit
