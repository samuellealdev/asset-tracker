---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui
  namespace: asset-tracker
  labels:
    app: web-ui
    component: frontend
    tier: web
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: web-ui
  template:
    metadata:
      labels:
        app: web-ui
    spec:
      containers:
        - name: web-ui
          image: asset-tracker-web-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: API_GO_URL
              valueFrom:
                configMapKeyRef:
                  name: asset-tracker-config
                  key: API_GO_URL
            - name: API_NODE_URL
              valueFrom:
                configMapKeyRef:
                  name: asset-tracker-config
                  key: API_NODE_URL
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
