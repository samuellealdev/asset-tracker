apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-create-topics
  namespace: asset-tracker
  labels:
    app: kafka
spec:
  ttlSecondsAfterFinished: 60
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-topics
          image: apache/kafka:3.9.2
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Kafka broker..."
              until /opt/kafka/bin/kafka-topics.sh \
                --bootstrap-server kafka-service:9092 --list 2>/dev/null; do
                echo "Kafka not ready yet, retrying in 5s..."
                sleep 5
              done
              echo "Kafka ready. Creating topic..."
              /opt/kafka/bin/kafka-topics.sh \
                --bootstrap-server kafka-service:9092 \
                --create --topic device-events \
                --partitions 1 --replication-factor 1 \
                --if-not-exists
              echo "Topic device-events created."
