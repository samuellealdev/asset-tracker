---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-service
  namespace: asset-tracker
  labels:
    app: go-service
    component: api
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-service
  template:
    metadata:
      labels:
        app: go-service
    spec:
      containers:
        - name: go-service
          image: asset-tracker-go-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: asset-tracker-config
                  key: GO_PORT
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: asset-tracker-secret
                  key: POSTGRES_DSN
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef:
                  name: asset-tracker-config
                  key: KAFKA_BROKER
            - name: KAFKA_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: asset-tracker-config
                  key: KAFKA_TOPIC
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: go-service
  namespace: asset-tracker
  labels:
    app: go-service
spec:
  type: ClusterIP
  selector:
    app: go-service
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
