---
# Ingress for direct paths — /devices and /events (no rewrite needed)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: asset-tracker-ingress
  namespace: asset-tracker
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /devices
            pathType: Prefix
            backend:
              service:
                name: go-service
                port:
                  number: 8080
          - path: /events
            pathType: Prefix
            backend:
              service:
                name: node-service
                port:
                  number: 3000
---
# Ingress for health and metrics — /go/* and /node/* with path rewrite
# /go/health → /health on go-service
# /node/health → /health on node-service
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: asset-tracker-health-ingress
  namespace: asset-tracker
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /go(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: go-service
                port:
                  number: 8080
          - path: /node(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: node-service
                port:
                  number: 3000
