apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: asset-tracker-ingress
  namespace: asset-tracker
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /devices
            pathType: Prefix
            backend:
              service:
                name: go-service
                port:
                  number: 8080
          - path: /events
            pathType: Prefix
            backend:
              service:
                name: node-service
                port:
                  number: 3000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: node-service
                port:
                  number: 3000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: node-service
                port:
                  number: 3000
