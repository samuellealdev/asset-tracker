# Asset Tracker — Phase 0 Development Environment
# All services on shared bridge network app-network
# See .env.example for configuration

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-asset_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-asset_tracker}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mongo}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand(\"ping\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  kafka:
    image: apache/kafka:3.9.2
    ports:
      - "9092:9092"
    environment:
      # KRaft mode: no Zookeeper. Single PLAINTEXT listener for Docker network.
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: "1"
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      # Allow auto-creation of topics (dev only; production should pre-create topics)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Static cluster ID for deterministic startup
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  kafka-setup:
    image: apache/kafka:3.9.2
    entrypoint: ["/opt/kafka/bin/kafka-topics.sh"]
    command:
      - --bootstrap-server=kafka:9092
      - --create
      - --if-not-exists
      - --topic=device-events
      - --partitions=1
      - --replication-factor=1
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-network
    restart: "no"

  go-service:
    build:
      context: ./go-service
    ports:
      - "${GO_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      POSTGRES_DSN: ${POSTGRES_DSN}
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: device-events
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-string}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1h}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "/server", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  node-service:
    build:
      context: ./node-service
    ports:
      - "${NODE_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      MONGO_URI: ${MONGO_URI}
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: device-events
      KAFKA_CONSUMER_GROUP: asset-tracker-node
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web-ui:
    build:
      context: ./web-ui
    ports:
      - "${WEB_UI_PORT:-80}:80"
    environment:
      API_GO_URL: http://go-service:8080
      API_NODE_URL: http://node-service:3000
    depends_on:
      go-service:
        condition: service_healthy
      node-service:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  kafka_data:
