# Asset Tracker — Phase 0 Development Environment
# All services on shared bridge network app-network
# See .env.example for configuration

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-asset_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-asset_tracker}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mongo}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand(\"ping\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  kafka:
    image: apache/kafka:3.9.2
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      # KRaft mode: no Zookeeper. Dual listeners: INTERNAL (docker) + EXTERNAL (host).
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: "1"
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      # Auto-create the device-events topic on startup
      KAFKA_CREATE_TOPICS: "device-events:1:1"
      # Allow auto-creation of topics (dev only; production should pre-create topics)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Static cluster ID for deterministic startup
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  go-service:
    build:
      context: ./go-service
    ports:
      - "${GO_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      POSTGRES_DSN: ${POSTGRES_DSN}
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: device-events
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "/server", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  node-service:
    build:
      context: ./node-service
    ports:
      - "${NODE_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      MONGO_URI: ${MONGO_URI}
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: device-events
      KAFKA_CONSUMER_GROUP: asset-tracker-node
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  kafka_data:
